<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
<meta name="theme-color" content="#14160f" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="INDO 2026" />
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-512.png">
<title>INDO 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" crossorigin="anonymous">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌴</text></svg>">
<style>
  :root{
    --bg:#f4f5f0; --card:#ffffff; --ink:#14160f; --muted:#70756a; --faint:#9aa093;
    --line:#e7e9e1; --line-strong:#d6d9cd;
    --accent:#c4f53d; --accent-deep:#5f8b06; --accent-soft:#eef9c9;
    --blue:#2f6fed; --violet:#7c5cf0; --amber:#e08a00; --green:#11936a; --red:#e0483d; --teal:#0e9aa0; --grey:#7b8071;
    --shadow:0 1px 2px rgba(20,22,15,.04), 0 6px 20px rgba(20,22,15,.05);
    --radius:15px; --head-h:64px; --bar-h:56px;
    /* bottom inset for the tab bar: hug the home indicator (shave 8px, never below 6px) */
    --bar-pad:max(calc(env(safe-area-inset-bottom) - 8px), 6px);
    --ease:cubic-bezier(.22,.7,.2,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  /* iOS standalone (≤18): on an UNSCROLLABLE document iOS parks its short viewport at the
     top of the screen (dead strip at the bottom); on a scrollable one it bottom-anchors and
     the tab bar sits flush (verified on-device — Settings looked right, Today didn't).
     So in standalone, force every view to overflow by 1px so iOS always bottom-anchors. */
  html.standalone body{min-height:calc(100vh + 1px)}
  body{
    font-family:'DM Sans',system-ui,-apple-system,sans-serif; color:var(--ink); background:var(--bg);
    -webkit-font-smoothing:antialiased; line-height:1.45; font-size:15px;
    overscroll-behavior-y:none;
  }
  .mono{font-family:'DM Mono',ui-monospace,monospace}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; font-size:inherit; -webkit-tap-highlight-color:transparent}
  input,select,textarea{font-family:inherit; font-size:16px; color:var(--ink)}
  a{color:var(--accent-deep); text-decoration:none}
  a:hover{text-decoration:underline}

  /* ---------- Splash ---------- */
  #splash{position:fixed; inset:0; z-index:200; background:radial-gradient(125% 80% at 50% 32%, #20241a, #0d0e0a);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; transition:opacity .55s var(--ease), transform .55s var(--ease)}
  #splash.done{opacity:0; transform:scale(1.05); pointer-events:none}
  #splash .sun{width:64px; height:64px; border-radius:50%; background:radial-gradient(circle at 50% 38%, #eaff86, var(--accent));
    box-shadow:0 0 70px rgba(196,245,61,.55); animation:sunrise 1.1s var(--ease) both}
  #splash .wm{display:flex; gap:.04em; font-weight:700; font-size:clamp(30px,9vw,44px); letter-spacing:.12em; color:#fff}
  #splash .wm span{display:inline-block; animation:charup .55s var(--ease) both}
  #splash .tag{color:#a9ae98; font-size:12px; letter-spacing:.34em; text-transform:uppercase; animation:fadein .8s .35s both}
  @keyframes sunrise{from{transform:translateY(26px) scale(.5); opacity:0} to{transform:none; opacity:1}}
  @keyframes charup{from{transform:translateY(16px); opacity:0; filter:blur(5px)} to{transform:none; opacity:1; filter:none}}
  @keyframes fadein{from{opacity:0} to{opacity:1}}

  /* ---------- Header ---------- */
  header.top{position:sticky; top:0; z-index:40; background:rgba(244,245,240,.82); backdrop-filter:saturate(180%) blur(18px); border-bottom:1px solid var(--line); padding-top:env(safe-area-inset-top)}
  .top-in{max-width:1320px; margin:0 auto; padding:9px 16px; display:flex; align-items:center; gap:14px}
  .brand{display:flex; align-items:center; gap:10px; min-width:0}
  .brand .logo{font-size:20px; filter:drop-shadow(0 2px 4px rgba(0,0,0,.12))}
  .brand .wm{font-weight:700; font-size:18px; letter-spacing:.04em; line-height:1}
  .brand .sub{display:block; font-size:11.5px; color:var(--muted); border:none; background:transparent; padding:1px 3px; border-radius:6px; width:140px; margin-top:1px}
  .brand .sub:hover{background:#fff} .brand .sub:focus{outline:1.5px solid var(--accent); background:#fff}
  .clocks{display:flex; gap:7px; margin-left:auto}
  .clock{display:flex; flex-direction:column; gap:0; background:var(--card); border:1px solid var(--line); border-radius:11px; padding:5px 11px; min-width:84px}
  .clock .lbl{font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted)}
  .clock .t{font-weight:500; font-size:16px; letter-spacing:-.01em}
  .clock .sub2{font-size:10.5px; color:var(--faint)}
  .clock.dest{background:var(--ink); color:#fff; border-color:var(--ink)}
  .clock.dest .lbl{color:#c7cbbe} .clock.dest .sub2{color:#9aa08e}
  nav.tabs{display:flex; gap:3px; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:4px}
  nav.tabs button{padding:7px 15px; border-radius:9px; font-weight:600; color:var(--muted); font-size:14px}
  nav.tabs button.active{background:var(--ink); color:#fff}
  nav.tabs button:not(.active):hover{background:var(--bg)}
  .gear{width:38px; height:38px; border-radius:11px; border:1px solid var(--line); background:var(--card); display:flex; align-items:center; justify-content:center; font-size:17px; color:var(--muted); flex:none}
  .gear.active,.gear:hover{background:var(--ink); color:#fff; border-color:var(--ink)}

  /* ---------- Layout (desktop = split) ---------- */
  .app{max-width:1320px; margin:0 auto; padding:16px; display:grid; grid-template-columns:minmax(0,1fr) 470px; gap:16px; align-items:start}
  .panel{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow)}
  .mapwrap{position:sticky; top:calc(var(--head-h) + 16px)}
  #map{height:calc(100vh - var(--head-h) - 90px); min-height:440px; width:100%; border-radius:var(--radius); z-index:1}
  .map-foot{display:flex; align-items:center; gap:10px; flex-wrap:wrap; padding:10px 14px; border-top:1px solid var(--line); font-size:12.5px; color:var(--muted)}
  @media(min-width:860px){ .map-foot #satBtn{margin-left:auto} }
  .legend{display:flex; gap:12px; flex-wrap:wrap}
  .legend span{display:inline-flex; align-items:center; gap:5px}
  .legend i{width:10px;height:10px;border-radius:50%;display:inline-block}

  /* ---------- Bottom tab bar (mobile only) ---------- */
  .tabbar{position:fixed; left:0; right:0; bottom:calc(0px - var(--vv-gap,0px)); z-index:50; display:none; justify-content:space-around;
    background:rgba(244,245,240,.88); backdrop-filter:saturate(180%) blur(22px); border-top:1px solid var(--line); padding-bottom:var(--bar-pad)}
  .tabbar button{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 0 5px; color:var(--faint); font-size:10px; font-weight:600; transition:color .15s}
  .tabbar button .ti{font-size:20px; line-height:1; transition:transform .15s var(--ease)}
  .tabbar button .ti{padding:3px 16px; border-radius:20px; transition:background .15s, transform .15s var(--ease)}
  .tabbar button{position:relative; z-index:1}
  .tabbar button.active{color:var(--ink); font-weight:700}
  .tabbar button.active .ti{transform:translateY(-1px)}
  .tabbar button:active .ti{transform:scale(.9)}
  .tab-ind{position:absolute; top:0; left:0; width:0; height:0; border-radius:15px; background:var(--accent); z-index:0; opacity:0; pointer-events:none; transition:transform .36s cubic-bezier(.3,1.32,.4,1), width .36s cubic-bezier(.3,1.32,.4,1), height .22s var(--ease), opacity .22s}

  /* ---------- Section heads / buttons ---------- */
  .sec-head{display:flex; align-items:center; gap:12px; padding:16px 18px; border-bottom:1px solid var(--line); flex-wrap:wrap}
  .sec-head h2{margin:0; font-size:16px; font-weight:700; letter-spacing:-.01em}
  .sec-head .sp{margin-left:auto}
  .btn{display:inline-flex; align-items:center; gap:7px; padding:9px 15px; border-radius:11px; font-weight:600; font-size:14px; background:var(--ink); color:#fff; border:1px solid var(--ink); transition:transform .05s ease, filter .15s}
  .btn:hover{filter:brightness(1.12)} .btn:active{transform:scale(.96)}
  .btn.lime{background:var(--accent); color:var(--ink); border-color:var(--accent)}
  .btn.ghost{background:var(--card); color:var(--ink); border-color:var(--line-strong)}
  .btn.ghost:hover{background:var(--bg); filter:none}
  .btn.sm{padding:6px 11px; font-size:13px; border-radius:9px; font-weight:500}
  .btn.danger{background:#fff; color:var(--red); border-color:#f0c6c2}
  .iconbtn{width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:var(--card);color:var(--muted)}
  .iconbtn:hover{background:var(--bg); color:var(--ink)} .iconbtn:active{transform:scale(.92)}

  /* ---------- View title (iOS large title) ---------- */
  .viewhead{padding:18px 18px 4px}
  .viewhead .vt{font-size:30px; font-weight:700; letter-spacing:-.025em; line-height:1.05}
  .viewhead .vs{color:var(--muted); font-size:13.5px; margin-top:3px}

  /* ---------- TODAY: day strip + pager + timeline ---------- */
  .daystrip{display:flex; gap:7px; overflow-x:auto; padding:12px 16px 10px; scrollbar-width:none; -webkit-overflow-scrolling:touch; scroll-snap-type:x proximity}
  .daystrip::-webkit-scrollbar{display:none}
  .daypill{flex:none; display:flex; flex-direction:column; align-items:center; justify-content:center; min-width:52px; padding:8px 11px; border-radius:14px; border:1px solid var(--line); background:var(--card); line-height:1.1; scroll-snap-align:center; transition:transform .08s}
  .daypill:active{transform:scale(.94)}
  .daypill .dw{font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted)}
  .daypill .dd{font-size:18px; font-weight:700; margin-top:1px}
  .daypill.active{background:var(--ink); color:#fff; border-color:var(--ink)}
  .daypill.active .dw{color:#c7cbbe}
  .daypill .tdot{width:5px;height:5px;border-radius:50%;background:transparent;margin-top:3px}
  .daypill.istoday .tdot{background:var(--accent)}
  .daypill.active.istoday .tdot{background:var(--accent)}

  .pager{overflow:hidden; position:relative}
  .pager-track{display:flex; will-change:transform}
  .daypage{flex:0 0 100%; padding:8px 16px 18px; min-width:0}
  .daytitle{display:flex; align-items:baseline; gap:10px; margin:6px 2px 14px; flex-wrap:wrap}
  .daytitle .dbig{font-size:21px; font-weight:700; letter-spacing:-.015em}
  .daytitle .dsub{color:var(--muted); font-size:12.5px}
  .daytitle .dtz{font-size:10.5px; color:var(--accent-deep); background:var(--accent-soft); padding:2px 8px; border-radius:20px; font-weight:600}
  .countdown{display:flex; align-items:center; gap:12px; background:linear-gradient(135deg, var(--ink), #2a2e22); color:#fff; border-radius:14px; padding:14px 16px; margin-bottom:14px}
  .countdown .num{font-size:30px; font-weight:700; color:var(--accent); line-height:1}
  .countdown .ct{font-size:13px; color:#d4d8c8}

  .tl{position:relative; margin:0 1px}
  .tl-row{display:flex; align-items:stretch}
  .tl-time{flex:0 0 50px; font-size:12.5px; text-align:right; padding-top:13px; color:var(--ink); white-space:nowrap; overflow:hidden; transition:flex-basis .28s var(--ease), opacity .2s}
  .tl-time .z{display:block; font-size:9.5px; color:var(--muted); letter-spacing:.02em}
  .tl-rail{flex:0 0 22px; position:relative; transition:flex-basis .28s var(--ease), opacity .2s}
  .tl-rail::before{content:""; position:absolute; left:50%; top:0; bottom:0; width:2px; background:var(--line); transform:translateX(-50%)}
  .tl-row:first-child .tl-rail::before{top:14px}
  .tl-row.last .tl-rail::before{height:14px; bottom:auto}
  .tl-dot{position:absolute; left:50%; top:13px; width:13px; height:13px; border-radius:50%; background:var(--c,#999); border:2.5px solid var(--card); transform:translateX(-50%); z-index:1}
  .tl-card{flex:1 1 auto; min-width:0; padding:11px 13px; margin:6px 0 10px; border:1px solid var(--line); border-radius:13px; background:var(--card); transition:border-color .18s var(--ease), box-shadow .18s var(--ease)}
  .tl-card .h{display:flex; align-items:center; gap:8px}
  .tl-card .e{font-size:18px}
  .tl-card .t{font-weight:700; font-size:14.5px; letter-spacing:-.01em; flex:1; min-width:0}
  .tl-card .loc{display:flex; align-items:flex-start; gap:6px; margin-top:6px; font-size:12.5px; color:var(--muted)}
  .tl-card .loc .nm{color:var(--ink)}
  .tl-card .mini{display:inline-flex; gap:3px; margin-left:auto}
  .tl-card .note{margin-top:7px; font-size:12px; color:#52564a; background:var(--bg); border-radius:8px; padding:6px 9px}
  .tl-card .ref{font-size:11.5px; color:var(--muted); margin-top:6px}
  .tl-card.dim{opacity:.5}
  .tl-card.now{border-color:var(--accent-deep); box-shadow:0 0 0 3px var(--accent-soft)}
  .tl-card.next{border-color:var(--ink); box-shadow:0 0 0 3px rgba(20,22,15,.07)}
  .stat{font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; padding:2px 7px; border-radius:20px; flex:none}
  .stat.now{background:var(--accent); color:var(--ink)}
  .stat.next{background:var(--ink); color:#fff}
  .tl-leg{font-size:11.5px; color:var(--muted); padding:3px 0 10px}
  .tl-leg a{font-size:11.5px}
  .tl-nowrow .tl-rail::before{background:linear-gradient(var(--line),var(--accent),var(--line))}
  .nowline{display:flex; align-items:center; gap:8px; padding:2px 0 12px}
  .nowline .ln{flex:1; height:2px; background:var(--accent); border-radius:2px}
  .nowline .lbl{font-size:10px; font-weight:700; letter-spacing:.06em; color:var(--accent-deep); background:var(--accent-soft); padding:2px 8px; border-radius:20px; display:flex; gap:5px; align-items:center}
  .nowline .pulse{width:7px;height:7px;border-radius:50%;background:var(--accent-deep);animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(95,139,6,.5)}70%{box-shadow:0 0 0 7px rgba(95,139,6,0)}100%{box-shadow:0 0 0 0 rgba(95,139,6,0)}}
  .freeday{text-align:center; color:var(--faint); padding:30px 10px; font-size:14px}

  /* ---------- PLAN (full itinerary) ---------- */
  .it-body{padding:6px 14px 18px}
  .daybar{display:flex; align-items:center; gap:10px; margin:18px 4px 8px}
  .daybar:first-child{margin-top:6px}
  .daybar .d{font-weight:700; font-size:14px}
  .daybar .ln{flex:1; height:1px; background:var(--line)}
  .daybar .dtz{font-size:11px; color:var(--muted); background:var(--bg); border:1px solid var(--line); padding:2px 8px; border-radius:20px}
  .card{position:relative; display:flex; gap:13px; padding:14px; border:1px solid var(--line); border-radius:13px; background:var(--card); margin:8px 0; transition:border-color .15s, box-shadow .15s}
  .card:hover{border-color:var(--line-strong); box-shadow:var(--shadow)}
  .card.sel{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .ic{flex:none; width:42px;height:42px;border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:21px; background:var(--bg)}
  .card .body{flex:1; min-width:0}
  .card .row1{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap}
  .card .ttl{font-weight:700; font-size:15.5px; letter-spacing:-.01em}
  .tag{font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; font-weight:700; padding:2px 8px; border-radius:20px; color:#fff}
  .when{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin:5px 0 2px; font-size:13.5px}
  .when .time{font-weight:500}
  .tz{font-size:11px; padding:1px 7px; border-radius:6px; background:var(--accent-soft); color:var(--accent-deep); font-weight:600; letter-spacing:.02em}
  .home-eq{font-size:12px; color:var(--faint)}
  .arrow{color:var(--faint)}
  .zonechg{font-size:11.5px; color:var(--amber); font-weight:600; background:#fff6e6; padding:1px 8px; border-radius:6px; border:1px solid #f6e2bd}
  .loc{display:flex; align-items:flex-start; gap:7px; margin-top:7px; font-size:13.5px; color:var(--ink)}
  .loc .pin{color:var(--red); flex:none; margin-top:1px}
  .loc .addr{color:var(--muted); font-size:12.5px}
  .loc-actions{display:inline-flex; gap:4px; margin-left:2px; vertical-align:middle}
  .chiprow{display:flex; gap:6px; flex-wrap:wrap; margin-top:9px}
  .chip{display:inline-flex; align-items:center; gap:5px; font-size:12px; padding:3px 9px; border-radius:8px; background:var(--bg); border:1px solid var(--line); color:var(--muted)}
  .chip.doc{cursor:pointer; color:var(--ink)} .chip.doc:hover{border-color:var(--accent-deep); color:var(--accent-deep)}
  .chip .k{color:var(--faint)}
  .notes{margin-top:9px; font-size:13px; color:#43463c; background:var(--bg); border:1px dashed var(--line-strong); border-radius:10px; padding:8px 11px; white-space:pre-wrap}
  .card .edit{position:absolute; top:10px; right:10px; opacity:0; transition:opacity .15s}
  .card:hover .edit{opacity:1}
  .leg{display:flex; gap:10px; margin:2px 0 2px 20px; padding-left:24px; border-left:2px dashed var(--line-strong)}
  .leg .legcard{flex:1; background:var(--bg); border:1px solid var(--line); border-radius:11px; padding:9px 12px; margin:4px 0; font-size:13px}
  .leg .lr{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .leg .mode{font-size:15px}
  .leg b{font-weight:700}
  .leg .gap{margin-left:auto; font-size:12px; color:var(--muted)}
  .leg .gap.tight{color:var(--red); font-weight:600}
  .leg .live{display:flex; gap:14px; flex-wrap:wrap; margin-top:6px; font-size:12.5px}
  .leg .live .v{font-weight:500}
  .badge-live{font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--green); background:#e6f6ef; padding:1px 6px; border-radius:5px}
  .badge-est{font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); background:var(--bg); border:1px solid var(--line); padding:1px 6px; border-radius:5px}
  .leg-links{display:flex; gap:8px; align-items:center; margin-top:4px}
  .spin{display:inline-block;width:11px;height:11px;border:2px solid var(--line-strong);border-top-color:var(--accent-deep);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-1px}
  @keyframes sp{to{transform:rotate(360deg)}}

  .empty{text-align:center; padding:48px 24px; color:var(--muted)}
  .empty .big{font-size:40px; margin-bottom:8px}
  .empty h3{margin:0 0 6px; color:var(--ink); font-size:18px}
  .empty .cta{display:flex; gap:10px; justify-content:center; margin-top:18px; flex-wrap:wrap}

  /* ---------- Documents ---------- */
  .doc-body{padding:14px 18px 20px}
  .drive{display:flex; align-items:center; gap:12px; padding:14px; border:1px solid var(--line); border-radius:13px; background:linear-gradient(180deg,#fff, var(--bg)); margin-bottom:14px}
  .drive .gic{width:42px;height:42px;border-radius:11px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:20px;flex:none}
  .drive .t{font-weight:700} .drive .s{font-size:12.5px;color:var(--muted)}
  .doc-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px}
  .doccard{display:flex; gap:10px; padding:12px; border:1px solid var(--line); border-radius:12px; background:var(--card); position:relative}
  .doccard:hover{border-color:var(--line-strong); box-shadow:var(--shadow)}
  .doccard .dic{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--bg);flex:none}
  .doccard .t{font-weight:600; font-size:14px; word-break:break-word}
  .doccard .cat{font-size:11px; color:var(--muted)}
  .doccard .x{position:absolute; top:7px; right:7px; opacity:0}
  .doccard:hover .x{opacity:1}

  /* ---------- Settings ---------- */
  .set-body{padding:6px 18px 22px}
  .field{margin:15px 0}
  .field label{display:block; font-weight:600; font-size:13.5px; margin-bottom:5px}

       NOTE: --head-h is the MEASURED header height and already includes env(safe-area-inset-top)
       (header.top pads itself) — do NOT add the inset again here (it doubled the gap in the installed PWA) */
    body[data-view="today"] .app, body[data-view="hotspots"] .app{position:fixed; top:var(--head-h); bottom:calc(var(--bar-h) + var(--bar-pad) - var(--vv-gap,0px)); left:0; right:0; display:block; padding:0; --sheet-top:46%}

    #map{position:absolute; inset:0; height:auto; min-height:0; border-radius:0}

    .modal{animation:sheetup .32s var(--ease)}

  }

    background:rgba(255,255,255,.94); backdrop-filter:blur(8px); border-radius:20px; padding:6px 12px; font-size:12px; box-shadow:0 2px 10px rgba(0,0,0,.18); white-space:nowrap; overflow:hidden}

<script>
"use strict";
/* ============ INDO 2026 — single-file trip planner ============ */

const STORE_KEY = "indoTrip.v1";
const APP_BUILD = "11 Jun 2026 · r41";
// Built-in Google Maps key — restricted to henri-cmd.github.io + localhost, so safe in public source.

const IDN_ZONES = [
  {tz:"Asia/Makassar", abbr:"WITA", label:"Bali / Lombok / Sulawesi (WITA, UTC+8)"},

/* ---------- live sync (Firebase Realtime Database) ---------- */
function getTripId(){
  const h=(location.hash||"").match(/[#&]t=([\w-]+)/);
  let id = h?h[1]:localStorage.getItem("indoTrip.tripId");
  if(!id) id = (window.crypto&&crypto.randomUUID)?crypto.randomUUID():(uid()+uid()+uid());

function inviteLink(){ return location.origin+location.pathname+"#t="+(tripId||getTripId()); }
function setSyncStatus(s){ syncStatus=s; const b=$("#syncBadge"); if(b){ b.className="keystatus "+(s==="on"?"on":"off"); b.textContent=s==="on"?"● live":s==="connecting"?"… connecting":s==="error"?"⚠ check connection":"○ offline"; } }

  if(typeof firebase==="undefined"){ setSyncStatus("off"); return; }

    firebase.initializeApp(FIREBASE_CONFIG);

    tripId=getTripId(); setSyncStatus("connecting");
    fauth.onAuthStateChanged(u=>{ if(u) connectTrip(); });
    fauth.signInAnonymously().catch(()=>setSyncStatus("error"));
  }catch(e){ setSyncStatus("off"); }
}
function connectTrip(){
  if(tripRef) return;
  tripRef=fdb.ref("trips/"+tripId);
  tripRef.once("value").then(snap=>{
    if(!snap.exists() && (state.items.length||state.docs.length||(state.hotspots||[]).length)) pushAll();
  }).catch(()=>{}).finally(()=>{ tripRef.on("value", onRemote); setSyncStatus("on"); });
}
function onRemote(snap){
  const v=snap.val(); if(!v){ return; }
  if(v.meta) state.meta=Object.assign(blankState().meta, v.meta);
  state.items = v.items?Object.values(v.items):[];
  state.docs = v.docs?Object.values(v.docs):[];
  state.hotspots = v.hotspots?Object.values(v.hotspots):[];
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
  if($("#tripSub") && document.activeElement!==$("#tripSub") && state.meta.sub) $("#tripSub").value=state.meta.sub;

}
function pushAll(){ if(!tripRef) return; const items={},docs={},hs={};

function syncSet(path,val){ if(tripRef) tripRef.child(path).set(val).catch(()=>{}); }
function syncRemove(path){ if(tripRef) tripRef.child(path).remove().catch(()=>{}); }
function pushItems(){ const items={}; state.items.forEach(i=>items[i.id]=i); syncSet("items", items); }

const $ = s => document.querySelector(s);
function esc(s){ return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function toast(msg,ok){ const t=$("#toast"); t.innerHTML=(ok?'<span class="ok">✓</span> ':'')+esc(msg); t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200); }
async function copy(text){ try{ await navigator.clipboard.writeText(text); toast("Copied to clipboard",true);}catch(e){ const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); toast("Copied",true);} }
function isMobile(){ return matchMedia("(max-width:859px)").matches; }

/* ---- timezone math ---- */
function tzOffsetMin(tz,date){ try{
  const s=new Intl.DateTimeFormat("en-US",{timeZone:tz,timeZoneName:"longOffset"}).formatToParts(date).find(p=>p.type==="timeZoneName").value;
  const m=s.match(/GMT([+-])(\d{1,2})(?::?(\d{2}))?/); if(!m) return 0;
  return (m[1]==="-"?-1:1)*(parseInt(m[2],10)*60+parseInt(m[3]||"0",10));
}catch(e){ return 0; } }
function wallToInstant(dateStr,timeStr,tz){ if(!dateStr) return null;
  const naive=new Date(`${dateStr}T${(timeStr||"00:00")}:00Z`);
  let off=tzOffsetMin(tz,naive); let inst=new Date(naive.getTime()-off*60000);
  const off2=tzOffsetMin(tz,inst); if(off2!==off) inst=new Date(naive.getTime()-off2*60000);
  return inst; }
function fmtTime(inst,tz){ if(!inst) return ""; const h12=state.meta.clock==="12"; return new Intl.DateTimeFormat("en-GB",{timeZone:tz,hour:h12?"numeric":"2-digit",minute:"2-digit",hour12:h12}).format(inst); }
function fmtDateFull(inst,tz){ return inst?new Intl.DateTimeFormat("en-GB",{timeZone:tz,weekday:"long",day:"numeric",month:"long"}).format(inst):""; }
function fmtDateShort(inst,tz){ return inst?new Intl.DateTimeFormat("en-GB",{timeZone:tz,weekday:"short",day:"numeric",month:"short"}).format(inst):""; }
function fmtDateShort(inst,tz){ return inst?new Intl.DateTimeFormat("en-GB",{timeZone:tz,weekday:"short",day:"numeric",month:"short"}).format(inst):""; }
function fmtWeekday(inst,tz){ return inst?new Intl.DateTimeFormat("en-GB",{timeZone:tz,weekday:"short"}).format(inst):""; }
function fmtDayNum(inst,tz){ return inst?new Intl.DateTimeFormat("en-GB",{timeZone:tz,day:"numeric"}).format(inst):""; }
function fmtMonth(inst,tz){ return inst?new Intl.DateTimeFormat("en-GB",{timeZone:tz,month:"short"}).format(inst):""; }
function dayKey(inst,tz){ return inst?new Intl.DateTimeFormat("en-CA",{timeZone:tz,year:"numeric",month:"2-digit",day:"2-digit"}).format(inst):""; }
function tzAbbr(tz){ if(TZ_ABBR[tz]) return TZ_ABBR[tz]; const off=tzOffsetMin(tz,new Date()); return "UTC"+(off>=0?"+":"")+(off/60); }
function niceAbbr(tz,now){ if(TZ_ABBR[tz]) return TZ_ABBR[tz];
  try{ const v=new Intl.DateTimeFormat("en-GB",{timeZone:tz,timeZoneName:"short"}).formatToParts(now).find(p=>p.type==="timeZoneName")?.value; if(v && !/^GMT[+-]?\d/.test(v)) return v; }catch(e){}
  return offsetLabel(tz); }
function offsetLabel(tz){ const o=tzOffsetMin(tz,new Date()); const h=o/60; return "UTC"+(o>=0?"+":"")+(Number.isInteger(h)?h:h.toFixed(1)); }
function relOffset(a,b){ const diff=(tzOffsetMin(a,new Date())-tzOffsetMin(b,new Date()))/60; if(diff===0) return "same as home"; return (diff>0?"+":"")+(Number.isInteger(diff)?diff:diff.toFixed(1))+"h vs home"; }
function relTz(a,b){ const diff=(tzOffsetMin(a,new Date())-tzOffsetMin(b,new Date()))/60; return (diff>0?"+":"")+diff+"h"; }
function durText(ms){ if(ms==null||isNaN(ms)) return ""; let mins=Math.round(ms/60000); if(mins<1) return "0m"; const h=Math.floor(mins/60),m=mins%60; return (h?h+"h ":"")+(m?m+"m":(h?"":"0m")); }
function haversineKm(a,b){ const R=6371,toR=x=>x*Math.PI/180; const dLat=toR(b.lat-a.lat),dLng=toR(b.lng-a.lng); const s=Math.sin(dLat/2)**2+Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2; return R*2*Math.asin(Math.sqrt(s)); }

function startLoc(it){ return (it&&it.fromLoc&&it.fromLoc.lat!=null)?it.fromLoc:(it&&it.location&&it.location.lat!=null?it.location:null); }
function endLoc(it){ return (it&&it.toLoc&&it.toLoc.lat!=null)?it.toLoc:(it&&it.location&&it.location.lat!=null?it.location:null); }
function startTz(it){ return it.tz||state.meta.destTz; }
function endTz(it){ return it.tz2||it.tz||state.meta.destTz; }
function startInstant(it){ return wallToInstant(it.date,it.time,startTz(it)); }
function endInstant(it){ return it.date2?wallToInstant(it.date2,it.time2,endTz(it)):(it.time2&&it.date?wallToInstant(it.date,it.time2,endTz(it)):null); }
function sortedItems(){ return [...state.items].sort((a,b)=>{ const ai=startInstant(a),bi=startInstant(b); if(!ai)return 1; if(!bi)return -1; return ai-bi; }); }
function itemDayKey(it){ const si=startInstant(it); return si?dayKey(si,startTz(it)):"none"; }

/* ---- map ---- */
let map, markerLayer, lineLayer, markersById={};
let baseStd, baseSat, satLabels, satOn=false;
function initMap(){
  map=L.map("map",{zoomControl:true,scrollWheelZoom:true,attributionControl:false}).setView([-8.55,115.2],9);

  baseStd=L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:19,subdomains:"abcd",crossOrigin:"anonymous"});
  baseSat=L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{attribution:'Imagery &copy; Esri',maxZoom:19,crossOrigin:"anonymous"});
  satLabels=L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",{maxZoom:19,opacity:.9,crossOrigin:"anonymous"});
  baseStd.addTo(map);
  markerLayer=L.layerGroup().addTo(map); lineLayer=L.layerGroup().addTo(map);
}
function toggleSat(){ satOn=!satOn;

function loadGoogle(){ const key=getMapsKey(); if(!key||googleReady||googleLoading) return; googleLoading=true;
  window.__gmapsReady=()=>{ googleReady=true; googleLoading=false; legCache.clear(); if(ui.view==="itinerary"||ui.view==="today") renderMain(); };

function gDirections(o,d,departAt){ return new Promise(res=>{ if(!googleReady){res(null);return;}

  if(departAt&&departAt.getTime()>Date.now()+60000) opts.drivingOptions={departureTime:departAt,trafficModel:google.maps.TrafficModel.BEST_GUESS};
  else opts.drivingOptions={departureTime:new Date(Date.now()+60000),trafficModel:google.maps.TrafficModel.BEST_GUESS};
  svc.route(opts,(r,st)=>{ if(st==="OK"&&r.routes[0]){const leg=r.routes[0].legs[0]; res({dist:leg.distance?.text,dur:leg.duration?.text,traffic:leg.duration_in_traffic?.text||null});} else res({error:st}); });

async function fetchLeg(id,o,d,departInst){ if(!googleReady) return;
  const key=`${o.lat.toFixed(4)},${o.lng.toFixed(4)}>${d.lat.toFixed(4)},${d.lng.toFixed(4)}`;
  let data=legCache.get(key);
  if(!data){ const now=await gDirections(o,d,new Date()); let pred=null; if(departInst&&departInst.getTime()>Date.now()+3600000) pred=await gDirections(o,d,departInst); data={now,pred}; legCache.set(key,data); }

    if(data.now&&data.now.error){ box.innerHTML=`<span class="badge-est">est only</span> <span style="color:var(--muted)">Google: ${esc(data.now.error)}</span>`; return; }

function legInfo(a,b){ if(!a||!b) return null; const o=endLoc(a),d=startLoc(b); if(!o||!d) return null; const km=haversineKm(o,d); if(km<0.2) return null;

/* ===== Bottom sheet (mobile Itinerary + Hotspots): map behind, content in a draggable sheet ===== */
const SHEET_KEY="indoTrip.sheet";
/* Itinerary-first: the sheet never drops below the classic split — "half" (map as
   accessory above) or "full" (map hidden). No map-dominant peek state (Henri). */
let sheet={ state: (["half","full"].includes(localStorage.getItem(SHEET_KEY))?localStorage.getItem(SHEET_KEY):"half") };
function sheetViews(){ return ui.view==="today"||ui.view==="hotspots"; }
function sheetAppEl(){ return document.querySelector(".app"); }
function sheetSnapPx(name){ const a=sheetAppEl(); const H=a?a.clientHeight:600;
  if(name==="full") return 0;
  return Math.round(H*0.46); }
function sheetCurTop(){ const a=sheetAppEl(); const v=a&&a.style.getPropertyValue("--sheet-top"); return v?parseFloat(v):sheetSnapPx(sheet.state); }
function applySheetTop(px,animate){ const a=sheetAppEl(); if(!a) return; a.classList.toggle("sheet-anim",!!animate); a.style.setProperty("--sheet-top", Math.round(px)+"px"); }
function flyVisible(ll,z){ if(!map) return; z=Math.max(map.getZoom(), z||14); const pt=map.project(L.latLng(ll), z); pt.y += sheetCover()/2 - map.getSize().y*0.06; map.flyTo(map.unproject(pt,z), z, {duration:.5}); }
function sheetCover(){ if(!isMobile()||!sheetViews()) return 0; const a=sheetAppEl(); const H=a?a.clientHeight:0; return Math.max(0, H - sheetCurTop()); }
function setSheet(name,animate=true){
  if(!isMobile()||!sheetViews()) return;
  sheet.state=name; try{ localStorage.setItem(SHEET_KEY,name); }catch(e){}
  applySheetTop(sheetSnapPx(name),animate);
  const m=$("#main"); if(m) m.style.touchAction="pan-y"; // content always scrolls natively; the grip resizes the sheet
}
function bindSheetGestures(){
  const m=$("#main"); if(!m||m._sheet) return; m._sheet=true;
  let sx=0, sy=0, startTop=0, mode=null, dragging=false, lastY=0, lastT=0, vel=0;
  m.addEventListener("touchstart",e=>{
    mode=null; dragging=false;
    if(!isMobile()||!sheetViews()||e.touches.length!==1) return;
    const t=e.target;
    sx=e.touches[0].clientX; sy=e.touches[0].clientY; lastY=sy; lastT=Date.now(); vel=0;
    // THE HANDLE IS THE ONLY RESIZE CONTROL (Henri). Everything else — date row included —
    // scrolls natively and never moves the sheet.
    mode = t.closest(".sheet-grip") ? "grip" : null;
    startTop = sheetCurTop();
  },{passive:true});
  m.addEventListener("touchmove",e=>{
    if(!mode) return;
    const x=e.touches[0].clientX, y=e.touches[0].clientY;
    const dx=x-sx, dy=y-sy;
    const now=Date.now(); vel=(y-lastY)/Math.max(1,now-lastT); lastY=y; lastT=now;
    if(!dragging){
      if(Math.abs(dy)<4 && Math.abs(dx)<4) return; // ignore micro-jitter, then commit to the drag
      dragging=true;
    }
    e.preventDefault();

    if(t>half) t=half+(t-half)*0.25;                             // rubber-band below the classic split
    applySheetTop(Math.max(0,t), false);
  },{passive:false});

    if(!dragging){ mode=null; return; }
    mode=null; dragging=false;
    const proj=sheetCurTop()+vel*220;                            // velocity bias

    let best=snaps[0]; for(const s of snaps) if(Math.abs(s.px-proj)<Math.abs(best.px-proj)) best=s;
    setSheet(best.n,true);
  },{passive:true});
}

/* iOS 26 standalone bug: the layout viewport reserves phantom space for Safari's
   (hidden) toolbar, so fixed bottom elements float above the real screen bottom.
   Measure the true visible height and slide the chrome down by the difference.
   Self-healing: when iOS fixes it (Safari 26.1), the gap measures 0. */
function syncVVGap(){ try{
  // Measure the standalone viewport deficit (iOS ≤18 bug: layout+visual viewports are
  // reported short by the status-bar height, top-anchored; band at the bottom).
  let m=0;
  const vv=window.visualViewport;
  if(vv) m=Math.max(m, Math.round(vv.height + vv.offsetTop - innerHeight));
  if(navigator.standalone && innerHeight>innerWidth) m=Math.max(m, Math.min(120, screen.height - innerHeight));
  if(m<6) m=0;
  const de=document.documentElement;
  de.style.setProperty("--vv-meas", m+"px"); // diagnostics only (Settings readout)
  // DO NOT offset the chrome by it — verified on-device that iOS clips ALL painting
  // below its short viewport (the slid bar rendered cut off). The dead strip cannot
  // be drawn into at rest; it only becomes visible when iOS slides the window on scroll.
  de.style.setProperty("--vv-gap","0px");
  // With the 1px-overflow rule (html.standalone body) iOS bottom-anchors every view,
  // so the home indicator sits over the bar — keep the standard --bar-pad clearance.
  de.style.removeProperty("--bar-pad");
}catch(e){} }
window.visualViewport?.addEventListener("resize", syncVVGap);
window.visualViewport?.addEventListener("scroll", syncVVGap);

function countdownHTML(days){ const d=days&&days[0]; if(!d) return ""; const todayKey=dayKey(new Date(),state.meta.destTz); if(todayKey>=d.key) return "";
  const dd=Math.round((wallToInstant(d.key,"00:00",d.tz)-wallToInstant(todayKey,"00:00",state.meta.destTz))/86400000);

}
function dayTimelineHTML(d,todayKey){
  const isToday=d.key===todayKey; const now=Date.now(); const items=d.items;
  let nextMarked=false; const rows=[];
  items.forEach((it,i)=>{
    if(isToday){
      const s=startInstant(it)?.getTime(), e=(endInstant(it)||startInstant(it))?.getTime();
      if(s<=now && now<=e) it._st="now"; else if(s>now){ it._st = nextMarked?"future":"next"; if(!nextMarked) nextMarked=true; } else it._st="past";
    } else it._st="";
    rows.push(tlRow(it,i===items.length-1 && !legInfo(items[i],items[i+1])));
    const lg = items[i+1]?legInfo(it,items[i+1]):null;
    if(lg) rows.push(tlLeg(lg));
    const nx=items[i+1];
    if(nx){
      const aS=startInstant(it), aE=endInstant(it), bS=startInstant(nx);
      if(aE&&bS&&bS<aE){ rows.push({html:`<div class="gaprow warn"><span>⚠ overlaps by ${durShort(aE-bS)}</span></div>`}); }
      else if(!lg&&bS){ const ref=aE||aS; const gap=bS-ref;
        if(gap>=60*60000) rows.push({html:`<div class="gaprow free"><span>✨ ${aE?"":"~"}${durShort(gap)} free</span></div>`}); }
    }
  });
  if(isToday){
    let insertAt=items.filter(it=>startInstant(it)?.getTime()<=now).length;
    let count=0,rowIdx=rows.length;
    for(let r=0;r<rows.length;r++){ if(rows[r].__item){ if(count===insertAt){rowIdx=r;break;} count++; } }
    rows.splice(rowIdx,0,{html:`<div class="nowline"><span class="lbl"><span class="pulse"></span>NOW ${fmtTime(new Date(),state.meta.destTz)}</span><span class="ln"></span></div>`});
  }
  return items.length? `<div class="tl">${rows.map(r=>r.html).join("")}</div>` : `<div class="freeday">🌴 No plans — free day</div>`;
}
function durShort(ms){ const m=Math.max(1,Math.round(ms/60000)); const h=Math.floor(m/60); return h? h+"h "+String(m%60).padStart(2,"0")+"m" : m+"m"; }
function upNextHTML(d,todayKey){

}

function tlRow(it,isLast){

    </div>`;

  },{passive:true});

    html+=`<div class="esscard"><div class="ess-h">🆘 Essentials <button class="iconbtn" data-act="editEss" title="Edit">✎</button><button class="iconbtn" data-act="copyEss" title="Copy all">⧉</button></div><div class="ess-b">${esc(ess)}</div></div>`;
  } else {
    html+=`<button class="ess-add" data-act="editEss">🆘 Add essentials — insurance policy, embassy, emergency numbers…</button>`;

                    ...((itemDocs[it.id]||[]).map(docChipHTML)) ].join("");
      return `<div class="itdoc"><div class="itdoc-t">${t.emoji} ${esc(it.title||t.label)}</div><div class="chiprow">${chips}</div></div>`; }).join("");
    if(general.length) html+=`<div class="sec-sub">🗂 General</div>`;
  }
  if(general.length){
    html+=`<div class="doc-grid">`+general.map(d=>`<a class="doccard" href="${esc(d.url)}" target="_blank" rel="noopener"><span class="dic">${d.file?"📎":(DOC_ICON[d.cat]||"📄")}</span><span><div class="t">${esc(d.title)}</div><div class="cat">${esc(d.cat||"Other")} · ${d.file?"uploaded":"link"}${d.note?" · "+esc(d.note):""}</div></span><button class="iconbtn x" title="Delete" data-act="delDoc" data-id="${d.id}" onclick="event.preventDefault()">✕</button></a>`).join("")+`</div>`;

/* ====================== HOTSPOTS ====================== */
const HOTSPOT_TYPES = {
  food:{emoji:"🍽️",label:"Food & drink"}, sight:{emoji:"📸",label:"Sight"},
  activity:{emoji:"🎟️",label:"Activity"}, show:{emoji:"🎭",label:"Show / event"},
  beach:{emoji:"🏖️",label:"Beach"}, nature:{emoji:"🌿",label:"Nature"},
  shop:{emoji:"🛍️",label:"Shop"}, other:{emoji:"📍",label:"Other"}
};
let userLoc=null, userMarker=null, geoState="off"; // off | locating | on | denied
function startGeo(){
  if(!navigator.geolocation){ geoState="denied"; if(ui.view==="hotspots") renderHotspots(); return; }
  if(geoState==="on"){ recenterMe(); return; }
  geoState="locating"; if(ui.view==="hotspots") renderHotspots();
  navigator.geolocation.watchPosition(
    p=>{ userLoc={lat:p.coords.latitude,lng:p.coords.longitude}; geoState="on"; updateUserMarker(); if(ui.view==="hotspots") renderHotspots(); },
    ()=>{ geoState="denied"; if(ui.view==="hotspots") renderHotspots(); },
    {enableHighAccuracy:false, maximumAge:120000, timeout:20000});
}
function updateUserMarker(){ if(!map||!userLoc) return; const ll=[userLoc.lat,userLoc.lng];
  if(!userMarker){ userMarker=L.circleMarker(ll,{radius:7,weight:3,color:"#fff",fillColor:"#2f6fed",fillOpacity:1}).addTo(map); userMarker.bindPopup("📍 You are here"); }
  else userMarker.setLatLng(ll); }
function recenterMe(){ if(!map) return; if(userLoc) map.flyTo([userLoc.lat,userLoc.lng], Math.max(map.getZoom(),14), {duration:.5}); else startGeo(); }
function refLoc(){ return userLoc || {lat:-8.5,lng:115.2}; }
/* "from you" nav estimate under the map */
let fromMeReq=0;
function showFromMe(loc,label){
  const el=$("#fromme"); if(!el) return;
  if(!loc||loc.lat==null){ el.style.display="none"; return; }
  const gq=loc.lat+","+loc.lng;
  const dir=userLoc?`https://www.google.com/maps/dir/?api=1&origin=${userLoc.lat},${userLoc.lng}&destination=${gq}&travelmode=driving`
                   :`https://www.google.com/maps/dir/?api=1&destination=${gq}&travelmode=driving`;
  let est="";
  if(userLoc){ const km=haversineKm(userLoc,loc); est=`<span class="fe"><b>${distLabel(km)}</b> · ~${durText(Math.max(5,Math.round(km/32*60))*60000)}</span> · `; }
  el.innerHTML=`🧭 ${est}<a href="${dir}" target="_blank" rel="noopener">Directions ↗</a>`;
  el.style.display="flex";
  if(userLoc&&googleReady){ const my=++fromMeReq;
    gDirections({lat:userLoc.lat,lng:userLoc.lng},{lat:loc.lat,lng:loc.lng},new Date()).then(r=>{
      if(my!==fromMeReq||!r||r.error) return;
      const fe=el.querySelector(".fe"); if(fe) fe.innerHTML=`<b>${esc(r.traffic||r.dur)}</b> drive · ${esc(r.dist||"")} <span class="badge-live">live</span>`;
    });
  }
}
function hideFromMe(){ const el=$("#fromme"); if(el) el.style.display="none"; }
/* hotspots near an itinerary item (cut anything in a completely different place) */
function nearbyHotspots(it,maxKm=15,maxN=4){
  const base=startLoc(it)||endLoc(it); if(!base) return [];
  return (state.hotspots||[]).map(h=>({h, d:(h.location&&h.location.lat!=null)?haversineKm(base,h.location):Infinity}))
    .filter(x=>x.d<=maxKm).sort((a,b)=>a.d-b.d).slice(0,maxN);
}
function hotspotDist(h){ const l=h.location; if(!l||l.lat==null) return Infinity; return haversineKm(refLoc(), l); }
function sortedHotspots(){ return [...(state.hotspots||[])].sort((a,b)=>hotspotDist(a)-hotspotDist(b)); }
function distLabel(km){ return km<1?Math.round(km*1000)+" m":km.toFixed(km<10?1:0)+" km"; }

function renderHotspots(){
  const list=sortedHotspots();
  const locChip = geoState==="on" ? '<span class="chip" style="background:#e7f0ff;border-color:#cfe0ff;color:#2f6fed">◎ closest first</span>'
    : geoState==="locating" ? '<span class="chip">◎ locating…</span>'
    : geoState==="denied" ? '<span class="chip">◎ location off</span>'
    : '<button class="btn ghost sm" data-act="useLoc">◎ Use my location</button>';
  let html=`<div class="sheet-grip"></div><div class="sec-head"><h2>Hotspots</h2><div class="sp"></div>${locChip}<button class="btn lime" data-act="addHotspot">＋ Add</button></div><div class="hs-body">`;
  if(!list.length){
    html+=`<div class="empty"><div class="big">📍</div><h3>No hotspots yet</h3><p>Save places you want to check out — food, sights, activities, shops. Paste a Google Maps link and we'll grab the details; they sort by closest to you.</p>
      <div class="cta"><button class="btn lime" data-act="addHotspot">＋ Add a hotspot</button></div></div>`;
  } else html+=list.map(hotspotCard).join("");
  $("#main").innerHTML=html+`</div>`;
}

      <div class="hs-cat">${t.emoji} ${t.label}${h.rating?` · <span style="color:#b8860b">★ ${h.rating}</span>${h.ratingN?` <span style="color:var(--faint)">(${h.ratingN>=1000?(h.ratingN/1000).toFixed(1)+"k":h.ratingN})</span>`:""}`:""}${typeof h.price==="number"?` · <span style="color:var(--muted)">${"$".repeat(h.price+1)}</span>`:""}</div></div></div>
    <div class="hs-expand"${exp?' style="max-height:none"':''}>
      ${h.location&&(h.location.name||h.location.address)?`<div class="loc"><span class="pin">📍</span><span><span style="font-weight:500">${esc(h.location.name||"")}</span>${h.location.name&&h.location.address?"<br>":""}<span class="addr">${esc(h.location.address||"")}</span></span></div>`:""}
      ${hoursHTML(h)}
      ${h.url?`<div class="hs-link"><a href="${esc(/^https?:/.test(h.url)?h.url:'https://'+h.url)}" target="_blank" rel="noopener">🔗 ${esc(h.url.replace(/^https?:\/\//,'').slice(0,40))}</a></div>`:""}
      ${h.notes?`<div class="note">${esc(h.notes)}</div>`:""}
      ${(h.photos&&h.photos.length>1)?`<div class="hs-gallery">${h.photos.slice(1).map(u=>`<a class="hs-thumb" href="${esc(u)}" target="_blank" rel="noopener" style="background-image:url('${esc(u)}')"></a>`).join("")}</div>`:""}
      ${(()=>{ const li=state.items.find(x=>x.hotspotId===h.id); return li?`<button class="hs-linked" data-act="goItem" data-id="${li.id}">📅 In your plan · ${esc(li.title||"item")}${li.date?` · ${esc(fmtDateShort(startInstant(li),startTz(li)))}`:""}</button>`:""; })()}
      <div class="hs-actions">
        ${state.items.find(x=>x.hotspotId===h.id)?"":`<button class="btn lime sm" data-act="hsToItin" data-id="${h.id}">📅 Add to itinerary</button>`}
        <a class="btn ghost sm" href="${dir}" target="_blank" rel="noopener">🧭 Directions</a>
        <a class="btn ghost sm" href="${gmap}" target="_blank" rel="noopener">↗ Maps</a>
        ${(h.location?.lat!=null&&!isMobile())?`<button class="btn ghost sm" data-act="hsFocus" data-id="${h.id}">◎ Map</button>`:""}

function hoursHTML(h){ if(!h.hours||!h.hours.length) return ""; const today=(new Date().getDay()+6)%7; const line=(h.hours[today]||"").replace(/^\w+:\s*/,"");
  return `<details class="help" style="margin-top:9px"><summary>🕑 Today: ${esc(line||"see hours")}</summary><div class="inner"><ul style="margin:4px 0;padding-left:17px;line-height:1.7">${h.hours.map((l,i)=>`<li${i===today?' style="font-weight:600"':''}>${esc(l)}</li>`).join("")}</ul></div></details>`; }
function setHsExpanded(id,on){
  const el=document.querySelector('.hs-card[data-hs="'+cssEsc(id)+'"]'); if(!el) return;
  el.classList.toggle('expanded',on);
  const exp=el.querySelector('.hs-expand'); if(!exp) return;
  if(on){ exp.style.maxHeight=exp.scrollHeight+'px'; clearTimeout(exp._t); exp._t=setTimeout(()=>{ if(el.classList.contains('expanded')) exp.style.maxHeight='none'; },360); }
  else { exp.style.maxHeight=exp.scrollHeight+'px'; void exp.offsetHeight; exp.style.maxHeight='0px'; }
}
function toggleHotspot(id){
  if(!id) return; const now=Date.now(); if(id===_tapId && now-_tapT<400) return; _tapId=id; _tapT=now;
  if(ui.expandedId===id){ setHsExpanded(id,false); ui.expandedId=null; return; }
  if(ui.expandedId) setHsExpanded(ui.expandedId,false);
  ui.expandedId=id; setHsExpanded(id,true);
  const h=(state.hotspots||[]).find(x=>x.id===id);
  if(h&&h.location&&h.location.lat!=null&&map) flyVisible([h.location.lat,h.location.lng],14);

/* ====================== WEATHER (Open-Meteo, no key) ====================== */
const WX_STORE="indoTrip.wx";
let wx={}; try{ wx=JSON.parse(localStorage.getItem(WX_STORE)||"{}"); }catch(e){}
let wxFetching=false;
function wxEmoji(c){ if(c===0)return"☀️"; if(c<=2)return"🌤️"; if(c===3)return"☁️"; if(c<=48)return"🌫️"; if(c<=67)return"🌦️"; if(c<=82)return"🌧️"; if(c<=86)return"🌧️"; return"⛈️"; }
function wxKeyOf(l){ return l.lat.toFixed(1)+","+l.lng.toFixed(1); }
function dayWxLoc(d){ for(const it of d.items){ const l=startLoc(it)||endLoc(it); if(l&&l.lat!=null) return l; } return null; }
function assignWxLocs(days){ let last=null; days.forEach(d=>{ const l=dayWxLoc(d)||last; d._wxloc=l; if(l) last=l; }); }
function wxFor(d){ if(!d||!d._wxloc) return null; const e=wx[wxKeyOf(d._wxloc)]; return (e&&e.days&&e.days[d.key])||null; }
function wxChip(d){ const w=wxFor(d); if(!w) return ""; const pp=(w.pp!=null&&w.pp>=40)?` · ${w.pp}%`:""; return `${wxEmoji(w.code)} ${Math.round(w.tmax)}°${pp}`; }
function wxHorizonEnd(){ const t=new Date(); t.setDate(t.getDate()+15); return dayKey(t,state.meta.destTz); }
async function refreshWeather(days){
  if(!days||!days.length||wxFetching||!navigator.onLine) return;
  assignWxLocs(days);
  const today=dayKey(new Date(),state.meta.destTz), hEnd=wxHorizonEnd();
  const need={};
  days.forEach(d=>{ const l=d._wxloc; if(!l||d.key<today||d.key>hEnd) return; const k=wxKeyOf(l);
    const e=wx[k]; if(e && Date.now()-e.t<3*3600e3 && e.days && e.days[d.key]) return;
    (need[k]=need[k]||{lat:l.lat,lng:l.lng,from:d.key,to:d.key}); if(d.key<need[k].from)need[k].from=d.key; if(d.key>need[k].to)need[k].to=d.key; });
  const keys=Object.keys(need); if(!keys.length) return;
  wxFetching=true;
  try{
    await Promise.all(keys.map(async k=>{ const n=need[k];
      const u=`https://api.open-meteo.com/v1/forecast?latitude=${n.lat}&longitude=${n.lng}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&start_date=${n.from}&end_date=${n.to}`;
      const r=await fetch(u); if(!r.ok) return; const j=await r.json(); const dl=j.daily; if(!dl||!dl.time) return;
      const e=wx[k]={t:Date.now(), days:(wx[k]&&wx[k].days)||{}};
      dl.time.forEach((dt,i)=>{ e.days[dt]={code:dl.weather_code[i], tmax:dl.temperature_2m_max[i], tmin:dl.temperature_2m_min[i], pp:dl.precipitation_probability_max?.[i]}; });
    }));
    try{ localStorage.setItem(WX_STORE, JSON.stringify(wx)); }catch(e){}
    updateWxUI(days);
  }catch(e){} finally{ wxFetching=false; }
}
function updateWxUI(days){
  if(pagerCtl&&pagerCtl.days){ const d=pagerCtl.days[ui.dayIdx]; const el=$("#dbWx"); if(el){ const t=d?wxChip(d):""; el.textContent=t; el.style.display=t?"":"none"; } }
  document.querySelectorAll("[data-wxdate]").forEach(s=>{ const d=(days||[]).find(x=>x.key===s.dataset.wxdate); const t=d?wxChip(d):""; s.textContent=t; s.style.display=t?"":"none"; });
}

/* ===== Magic quick-add: one line of text → a real item ===== */
function inferType(s){ s=(s||"").toLowerCase();
  if(/\b(flight|fly|boarding|[a-z]{2}\d{2,4}\b)/.test(s)) return "flight";
  if(/\b(transfer|taxi|grab|gojek|pickup|pick-up|shuttle|driver|ferry|boat)\b/.test(s)) return "transfer";
  if(/\b(hotel|check[- ]?in|check[- ]?out|villa|resort|stay|airbnb)\b/.test(s)) return "hotel";
  if(/\b(dinner|lunch|breakfast|brunch|food|restaurant|cafe|coffee|drinks?|bar|eat|snack|warung)\b/.test(s)) return "food";
  return "activity"; }
function parseQuickAdd(raw){
  let t=(raw||"").trim(); if(!t) return null;
  let time="";
  let m=t.match(/\b(\d{1,2})[:.](\d{2})\s*(am|pm)?\b/i);
  if(!m) m=t.match(/\b(\d{1,2})\s*(am|pm)\b/i);
  if(m){
    let h=+m[1], mins=/^\d{2}$/.test(m[2]||"")?+m[2]:0;
    const ap=((m[3]||((m[2]&&!/^\d/.test(m[2]))?m[2]:""))||"").toLowerCase();
    if(ap==="pm"&&h<12)h+=12; if(ap==="am"&&h===12)h=0;
    if(h<24&&mins<60){ time=String(h).padStart(2,"0")+":"+String(mins).padStart(2,"0"); t=(t.slice(0,m.index)+t.slice(m.index+m[0].length)).replace(/\s{2,}/g," ").trim(); }
  }
  const lm=t.match(/\s(?:at|@)\s+(.+)$/i); const locQuery=lm?lm[1].trim():"";
  let title=t.replace(/^[-–·,\s]+|[-–·,\s]+$/g,"");
  if(title) title=title[0].toUpperCase()+title.slice(1);
  return {time, type:inferType(raw), title:title||"Plan", locQuery};
}
function quickAddSubmit(dateKey, raw){
  const pq=parseQuickAdd(raw); if(!pq||!pq.title||pq.title==="Plan"&&!pq.time) { toast("Type something like: 19:30 dinner at Locavore"); return; }
  const it={id:uid(), type:pq.type, title:pq.title, date:dateKey, time:pq.time, tz:state.meta.destTz, location:{}, docIds:[], files:[]};
  state.items.push(it); save(); syncSet("items/"+it.id,it);
  toast("✓ Added"+(pq.time?" · "+pq.time:"")+" · "+pq.title, true);
  renderMain(); refreshMap();
  if(pq.locQuery) quickAddEnrich(it.id, pq.locQuery);
}
async function quickAddEnrich(id, q){
  const apply=loc=>{ const it=state.items.find(x=>x.id===id); if(!it||!loc||loc.lat==null) return; it.location=loc; save(); syncSet("items/"+id,it); refreshMap(); if(ui.view==="today") renderMain(); };
  try{
    if(googleReady && placesSvc()){
      const opts={query:q}; try{ if(map){ opts.location=map.getCenter(); opts.radius=60000; } }catch(e){}
      placesSvc().textSearch(opts,(arr,st)=>{ if(st===google.maps.places.PlacesServiceStatus.OK&&arr&&arr[0]){ const r=arr[0]; const g=r.geometry&&r.geometry.location; apply({name:r.name, address:r.formatted_address||"", lat:g?g.lat():null, lng:g?g.lng():null}); } });
      return;
    }
    const resp=await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&q=${encodeURIComponent(q)}`,{headers:{Accept:"application/json"}});
    const arr=await resp.json();
    if(arr&&arr[0]) apply({name:(arr[0].display_name||q).split(",")[0], address:arr[0].display_name||"", lat:+arr[0].lat, lng:+arr[0].lon});
  }catch(e){}
}

function dayText(d){
  const lines=[`🌴 INDO 2026 — ${fmtDateFull(d.instant,d.tz)}`];
  if(!d.items.length) lines.push("Free day — nothing planned");
  d.items.forEach(it=>{
    const t=TYPES[it.type]||TYPES.other; const si=startInstant(it);
    const time=si?fmtTime(si,startTz(it)):"--:--";
    const isLeg=t.legtoo&&it.fromLoc;
    let loc="";
    if(isLeg){ loc=[it.fromLoc&&(it.fromLoc.name||it.fromLoc.address), it.toLoc&&(it.toLoc.name||it.toLoc.address)].filter(Boolean).join(" → "); }
    else if(it.location){ loc=[it.location.name,it.location.address].filter(Boolean).join(", "); }
    lines.push(`• ${it.done?"✅ ":""}${time} ${t.emoji} ${it.title||t.label}${it.flightNo?` (${it.flightNo})`:""}${loc?` — ${loc}`:""}${it.conf?` · ref ${it.conf}`:""}`);
  });
  return lines.join("\n");
}

/* ====================== CALENDAR EXPORT (.ics) ====================== */
function icsEsc(s){ return String(s||"").replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\r?\n/g,"\\n"); }
function icsDate(d){ return d.toISOString().replace(/[-:]/g,"").replace(/\.\d{3}Z$/,"Z"); }
function buildICS(){
  const out=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//INDO 2026//Trip//EN","CALSCALE:GREGORIAN","METHOD:PUBLISH","X-WR-CALNAME:INDO 2026"];
  let n=0;
  sortedItems().forEach(it=>{
    const s=startInstant(it); if(!s) return; n++;
    let e=endInstant(it); if(!e||e<=s) e=new Date(s.getTime()+3600e3);
    const t=TYPES[it.type]||TYPES.other;
    const isLeg=t.legtoo&&it.fromLoc;
    const lp=[]; const l1=startLoc(it), l2=endLoc(it);
    if(l1&&(l1.name||l1.address)) lp.push(l1.name||l1.address);
    if(isLeg&&l2&&(l2.name||l2.address)) lp.push(l2.name||l2.address);
    const dp=[];
    if(isLeg&&l1&&l2) dp.push((l1.name||"")+" → "+(l2.name||""));
    if(it.conf) dp.push("Booking ref: "+it.conf);
    if(it.notes) dp.push(it.notes);
    dp.push("INDO 2026 · "+location.origin+location.pathname);
    const lead=(it.type==="flight")?"-PT3H":(it.type==="transfer")?"-PT1H":"-PT45M";
    out.push("BEGIN:VEVENT","UID:"+it.id+"@indo2026","DTSTAMP:"+icsDate(new Date()),"DTSTART:"+icsDate(s),"DTEND:"+icsDate(e),
      "SUMMARY:"+icsEsc(t.emoji+" "+(it.title||t.label)),
      lp.length?"LOCATION:"+icsEsc(lp.join(" → ")):null,
      "DESCRIPTION:"+icsEsc(dp.join("\n")),
      "BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+icsEsc(it.title||t.label),"TRIGGER:"+lead,"END:VALARM",
      "END:VEVENT");
  });
  out.push("END:VCALENDAR");
  return {text:out.filter(Boolean).join("\r\n"), count:n};
}
function downloadICS(){
  const {text,count}=buildICS();
  if(!count){ toast("Nothing dated to export yet"); return; }
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([text],{type:"text/calendar;charset=utf-8"}));
  a.download="INDO-2026.ics"; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); },4000);
  toast(count+" events exported — open the file to add them",true);
}

function placesSearch(prefix){

async function doGeocode(prefix, skipPlaces){ const q=$("#"+prefix+"-q").value.trim(); if(!q) return;
  if(!skipPlaces && prefix==="hsloc" && googleReady && placesSvc() && !parseLatLng(q)){ placesSearch(prefix); return; }
  const coords=parseLatLng(q);
  if(coords){ setLoc(prefix,{name:"Locating…",address:"",lat:coords.lat,lng:coords.lng});
    reverseGeocode(coords).then(info=>setLoc(prefix,{name:info.name||"Pinned location",address:info.address||"",lat:coords.lat,lng:coords.lng}));
    return; }
  const res=$("#"+prefix+"-res"); res.innerHTML='<button disabled>Searching…</button>'; res.classList.add("show");
  try{ const r=await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&limit=6&q=${encodeURIComponent(q)}`,{headers:{"Accept":"application/json"}}); const arr=await r.json();
    if(!arr.length){ res.innerHTML='<button disabled>No matches — type an address or paste coordinates</button>'; return; }
    res.innerHTML=arr.map(a=>`<button type="button" data-lat="${a.lat}" data-lng="${a.lon}" data-name="${esc((a.display_name||"").split(",")[0])}" data-addr="${esc(a.display_name||"")}">📍 ${esc(a.display_name)}</button>`).join("");

  }catch(e){ res.innerHTML='<button disabled>Search failed — check connection or enter manually</button>'; }
}

    case "edit": closeDetail(); itemModal(state.items.find(x=>x.id===id)); break;
    case "closeDetail": closeDetail(); break;
    case "setPass": { const v=($("#passInput").value||"").trim(); if(!v){ toast("Type a code first"); break; } state.meta.passHash=hashCode(v); save(); pushMeta(); localStorage.setItem("indoTrip.unlock", state.meta.passHash); renderSettings(); toast("Passcode set",true); break; }
    case "clearPass": state.meta.passHash=""; save(); pushMeta(); localStorage.removeItem("indoTrip.unlock"); renderSettings(); toast("Passcode removed",true); break;
    case "saveItem": saveItem(); break;
    case "delItem": if(confirm("Delete this item?")){ state.items=state.items.filter(x=>x.id!==id); save(); syncRemove("items/"+id); closeModal(); refreshMap(); renderMain(); toast("Deleted",true);} break;
    case "closeModal": closeModal(); break;
    case "focus": focusItem(id); break;
    case "copy-loc": { const it=state.items.find(x=>x.id===id),role=a.dataset.role; const loc=role==="from"?it.fromLoc:role==="to"?it.toLoc:it.location; copy(loc.address||loc.name||""); break; }
    case "copy-conf": { const it=state.items.find(x=>x.id===id); copy(it.conf||""); break; }
    case "opendoc": window.open(a.dataset.url,"_blank","noopener"); break;
    case "addExample": loadExample(); break;
    case "addDoc": docModal(); break;
    case "saveDoc": saveDoc(); break;
    case "delDoc": if(confirm("Remove this document?")){ const dd=state.docs.find(d=>d.id===id); state.docs=state.docs.filter(d=>d.id!==id); state.items.forEach(it=>it.docIds=(it.docIds||[]).filter(x=>x!==id));
      if(dd&&dd.file&&fstore&&/firebasestorage/.test(dd.url||"")){ try{ fstore.refFromURL(dd.url).delete().catch(()=>{}); }catch(e){} }
      save(); syncRemove("docs/"+id); pushItems(); renderMain(); } break;
    case "rmDocFile": { const i=+a.dataset.i; if(draft&&draft._dfiles){ const f=draft._dfiles.splice(i,1)[0]; if(f&&fstore&&/firebasestorage/.test(f.url||"")){ try{ fstore.refFromURL(f.url).delete().catch(()=>{}); }catch(e){} } renderDocFileChips(); } break; }
    case "invite": copy(inviteLink()); toast("Invite link copied — send it to Elisa",true); break;
    case "export": exportData(); break;
    case "copyExp": copy($("#exp").value); break;
    case "downloadExp": { const blob=new Blob([$("#exp").value],{type:"text/plain"}); const u=URL.createObjectURL(blob); const x=document.createElement("a"); x.href=u; x.download="indo-2026-backup.txt"; x.click(); URL.revokeObjectURL(u); break; }
    case "import": importData(); break;
    case "doImport": { try{ const obj=JSON.parse(decodeURIComponent(escape(atob($("#imp").value.trim())))); if(!obj.meta) throw 0; state=obj; ui.dayIdx=null; save(); closeModal(); afterLoad(); pushAll(); toast("Imported",true);}catch(err){ toast("That code didn’t parse"); } break; }
    case "clear": if(confirm("Erase all trip data? This clears it on BOTH your and Elisa's devices. (Export a backup first if unsure.)")){ state=blankState(); ui.dayIdx=null; save(); if(tripRef) tripRef.set({meta:state.meta, items:{}, docs:{}, hotspots:{}}); afterLoad(); } break;
  }
});
document.addEventListener("input",e=>{ const s=e.target.closest("[data-set]"); if(!s) return; state.meta[s.dataset.set]=s.value.trim(); save(); pushMeta();
  if(s.dataset.set==="destTz"||s.dataset.set==="homeTz"||s.dataset.set==="clock") renderClocks(); });
document.addEventListener("change",e=>{ const s=e.target.closest("[data-set]"); if(s&&s.dataset.set==="mapsKey"){ googleReady=false; googleLoading=false; legCache.clear(); loadGoogle(); renderSettings(); } });
document.querySelectorAll("button[data-view]").forEach(b=>b.addEventListener("click",()=>setView(b.dataset.view))); // button[...] — body also carries data-view (CSS state); binding it re-rendered the view on EVERY click
$("#tripSub").addEventListener("input",e=>{ state.meta.sub=e.target.value; save(); pushMeta(); });
$("#fitBtn").addEventListener("click",()=>{ if(ui.view==="hotspots") refreshMap(); else applyMapFocus(null); });
$("#satBtn").addEventListener("click",toggleSat);
$("#meBtn")?.addEventListener("click",recenterMe);
/* contextual ➕: tap = create what this tab is about; long-press = full menu */
(function(){ const fab=$("#fab"); if(!fab) return; let lt=null, long=false;
  fab.addEventListener("touchstart",()=>{ long=false; clearTimeout(lt); lt=setTimeout(()=>{ long=true; openCreateMenu(); },480); },{passive:true});
  ["touchend","touchcancel","touchmove"].forEach(ev=>fab.addEventListener(ev,()=>clearTimeout(lt),{passive:true}));
  fab.addEventListener("click",()=>{ if(long){ long=false; return; }
    if(ui.view==="hotspots") hotspotModal(null);
    else if(ui.view==="documents") docModal();
    else itemModal(null); });
})();
$("#scrim").addEventListener("click",e=>{ if(e.target.id==="scrim") closeModal(); });
/* drag a sheet/modal down (from its header zone) to dismiss */
(function(){ const mo=$("#modal"); if(!mo) return; let sy=0,dragging=false,armed=false;
  mo.addEventListener("touchstart",e=>{ armed=false; dragging=false; if(!isMobile()||e.touches.length!==1) return;
    const y=e.touches[0].clientY, r=mo.getBoundingClientRect();
    if(e.target.closest("input,textarea,select")) return;
    armed = !!e.target.closest(".mh") || (y-r.top<44); sy=y; },{passive:true});
  mo.addEventListener("touchmove",e=>{ if(!armed) return; const dy=e.touches[0].clientY-sy;
    if(!dragging){ if(dy<8) return; dragging=true; mo.style.transition="none"; }
    e.preventDefault(); mo.style.transform="translateY("+Math.max(0,dy)+"px)"; },{passive:false});
  mo.addEventListener("touchend",e=>{ if(!dragging){ armed=false; return; } const dy=e.changedTouches[0].clientY-sy; dragging=false; armed=false;
    mo.style.transition="transform .26s var(--ease)";
    if(dy>110){ mo.style.transform="translateY(110%)"; setTimeout(()=>{ closeModal(); mo.style.transform=""; mo.style.transition=""; },230); }
    else { mo.style.transform=""; setTimeout(()=>{ mo.style.transition=""; },280); } },{passive:true});
})();
let _rT; window.addEventListener("resize",()=>{ clearTimeout(_rT); _rT=setTimeout(()=>{ syncHeadH(); syncVVGap(); moveTabInd(); if(isMobile()&&sheetViews()) setSheet(sheet.state,false); if(map){ map.invalidateSize(); if(!isMobile()||ui.view==="map") refreshMap(); } },140); });
matchMedia("(max-width:859px)").addEventListener?.("change",()=>{ if(!isMobile()&&ui.view==="map") setView("today"); else if(map) setTimeout(()=>{ map.invalidateSize(); refreshMap(); },90); });

/* ---- PWA: static manifest.webmanifest + icon-512.png in the repo.
   (Was a runtime blob manifest — iOS snapshots the manifest at Add-to-Home-Screen
   and blob URLs don't survive that, leaving a letterboxed/half-configured shell.
   Keep these as real files; icon-512.png was generated from the old makeIcon().) */

/* ---- splash ---- */
function buildSplash(){ $("#splashWm").innerHTML=[..."INDO 2026"].map((ch,i)=>`<span style="animation-delay:${0.15+i*0.05}s">${ch===" "?"&nbsp;":ch}</span>`).join(""); }
function hideSplash(){ const s=$("#splash"); if(s){ s.classList.add("done"); setTimeout(()=>s&&s.remove&&s.remove(),600); } }

/* ---- boot ---- */
function afterLoad(){ if(navigator.standalone) document.documentElement.classList.add("standalone"); document.body.dataset.itin=ui.itinMode; if(state.meta.sub) $("#tripSub").value=state.meta.sub; renderClocks(); renderMain(); bindSheetGestures(); if(isMobile()&&sheetViews()) setSheet(sheet.state,false); refreshMap(); loadGoogle(); syncHeadH(); setTimeout(moveTabInd,80); }
buildSplash();
initMap();
afterLoad();
initFirebase();
checkLock();
$("#lockBtn").addEventListener("click",tryUnlock);
$("#lockInput").addEventListener("keydown",e=>{ if(e.key==="Enter") tryUnlock(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape"){ if($("#detail").classList.contains("show")) closeDetail(); else if($("#scrim").classList.contains("show")) closeModal(); } });
setInterval(renderClocks,1000*20);
setInterval(()=>{ if(ui.view==="today"){ const days=tripDays(); if(days[ui.dayIdx]?.key===dayKey(new Date(),state.meta.destTz)) renderToday(); } },60000);
document.fonts?.ready.then(()=>{ syncHeadH(); });
$("#splash").addEventListener("click",hideSplash);
const reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
setTimeout(hideSplash, reduce?300:1400);
setTimeout(()=>{ if(map) map.invalidateSize(); syncHeadH(); },300);
/* offline: service worker caches the app shell + CDN + recent map tiles/photos */
if("serviceWorker" in navigator){ addEventListener("load",()=>{ navigator.serviceWorker.register("./sw.js").catch(()=>{}); }); }
window.addEventListener("offline",()=>toast("Offline — keep using the app; changes sync when you're back"));
window.addEventListener("online",()=>{ toast("Back online — syncing",true); if(!googleReady) loadGoogle(); });
</script>
